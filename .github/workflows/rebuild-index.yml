name: Rebuild dashboard index

# Aggregates every test-cases/**/*.yaml into dashboard-data/index.json so the
# dashboard renders from a single static fetch instead of API calls.
# Uses only the auto-provided GITHUB_TOKEN — no secrets to configure.

on:
  push:
    branches: [main]
    paths:
      - "test-cases/**"
      - "scripts/build_index.py"
      - "scripts/tcms_lib.py"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: rebuild-index
  cancel-in-progress: false

jobs:
  rebuild:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: python3 -m pip install --quiet pyyaml

      - name: Build dashboard-data/index.json
        run: python3 scripts/build_index.py

      - name: Commit updated index
        # The commit only touches dashboard-data/, which is not in this
        # workflow's path filters, so it cannot retrigger itself.
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dashboard-data/index.json
          if git diff --cached --quiet; then
            echo "Index unchanged - nothing to commit."
          else
            git commit -m "chore: rebuild dashboard index"
            git pull --rebase origin main
            git push origin main
          fi
