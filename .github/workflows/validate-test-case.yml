name: Validate test cases

# Validates every test case file against schema/test-case.schema.json and the
# repo conventions (file name matches id, folder matches suite, unique ids),
# and runs the unit tests for the YAML module and scripts.

on:
  push:
    branches: [main]
    paths:
      - "test-cases/**"
      - "schema/**"
      - "scripts/**"
      - "tests/**"
      - "yaml.js"
  pull_request:
    paths:
      - "test-cases/**"
      - "schema/**"
      - "scripts/**"
      - "tests/**"
      - "yaml.js"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: python3 -m pip install --quiet pyyaml jsonschema

      - name: Validate test case files against schema
        run: python3 scripts/validate_test_cases.py

      - name: Run unit tests
        run: |
          python3 -m unittest discover -s tests
          node --test tests/*.test.mjs
